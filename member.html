<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য ড্যাশবোর্ড - বন্ধুত্ব সঞ্চয় সমিতি</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .header-card { background: #ffffff; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .profile-section { display: flex; align-items: center; gap: 15px; }
        .profile-avatar { width: 60px; height: 60px; background: #1e3c72; color: white; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; font-weight: bold; }
        .profile-info h3 { margin: 0; font-size: 20px; color: #333; }
        .profile-info p { margin: 5px 0 0 0; color: #666; font-size: 14px; }
        .logout-btn { background: #ff5e5e; color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 5px solid #1e3c72; }
        .card.blue { border-left-color: #2196F3; }
        .card.green { border-left-color: #4CAF50; }
        .card.red { border-left-color: #F44336; }
        .card h4 { margin: 0 0 10px 0; color: #666; font-size: 16px; }
        .card p { margin: 0; font-size: 28px; font-weight: bold; color: #222; }
        .table-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; color: #555; }
        .status { padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .status.due { background: #ffebee; color: #c62828; }
    </style>
</head>
<body>

    <div class="header-card">
        <div class="profile-section">
            <div class="profile-avatar" id="user-initial">👤</div>
            <div class="profile-info">
                <h3 id="dashboard-user-name">স্বাগতম...</h3>
                <p>সদস্য আইডি: <span id="user-id-text">#--</span></p>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()">লগআউট</button>
    </div>

    <div class="grid">
        <div class="card blue">
            <h4>আমার মোট জমা</h4>
            <p id="my-deposit">০ টাকা</p>
        </div>
        <div class="card green">
            <h4>সমিতির মোট ফান্ড</h4>
            <p id="total-fund">০ টাকা</p> 
        </div>
        <div class="card red">
            <h4>আমার লোন বাকি</h4>
            <p id="my-loan">০ টাকা</p>
        </div>
    </div>

    <div class="table-section">
        <h3>আমার মাসিক জমার বিবরণ (২০২৬)</h3>
        <table>
            <thead>
                <tr>
                    <th>মাস</th>
                    <th>টাকার পরিমাণ</th>
                    <th>জমা দেওয়ার তারিখ</th>
                    <th>অবস্থা (Status)</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>জানুয়ারি ২০২৬</td>
                    <td>০ টাকা</td>
                    <td>--</td>
                    <td><span class="status due">বাকি আছে</span></td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const storedUsername = localStorage.getItem('username');
            
            if (!storedUsername) {
                window.location.href = 'index.html';
                return;
            }

            const displayName = storedUsername.toUpperCase();
            document.getElementById('dashboard-user-name').innerText = "স্বাগতম, " + displayName;
            document.getElementById('user-initial').innerText = displayName.charAt(0);

            // এপিআই থেকে ডেটা আনা
            try {
                const response = await fetch(`/api/get-member-info?username=${encodeURIComponent(storedUsername)}`);
                const data = await response.json();
                if (data.success) {
                    document.getElementById('user-id-text').innerText = "#" + data.memberId;
                    document.getElementById('total-fund').innerText = data.totalFund + " টাকা";
                    document.getElementById('my-deposit').innerText = data.myDeposit + " টাকা";
                } else {
                    document.getElementById('user-id-text').innerText = "@" + storedUsername;
                }
            } catch (e) {
                document.getElementById('user-id-text').innerText = "@" + storedUsername;
            }
        });

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
