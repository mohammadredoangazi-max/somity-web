<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বন্ধুত্ব সঞ্চয় সমিতি</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>বন্ধুত্ব সঞ্চয় সমিতি</h1>

        <!-- ট্যাব বোতামসমূহ -->
        <div class="tab-buttons">
            <button onclick="switchTab('login-tab')" id="login-btn" class="active">লগইন</button>
            <button onclick="switchTab('register-tab')" id="register-btn">নিবন্ধন (Register)</button>
        </div>

        <!-- সদস্য লগইন সেকশন -->
        <div id="login-tab" class="tab-content active">
            <h2>সদস্য হিসেবে লগইন করুন</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label>ইউজারনেম</label>
                    <input type="text" id="login_username" placeholder="আপনার ইউজারনেম লিখুন" required>
                </div>
                <div class="form-group">
                    <label>পাসওয়ার্ড</label>
                    <input type="password" id="login_password" placeholder="আপনার পাসওয়ার্ড লিখুন" required>
                </div>
                <button type="submit" class="btn">লগইন করুন</button>
            </form>
        </div>

        <!-- সদস্য নিবন্ধন সেকশন -->
        <div id="register-tab" class="tab-content">
            <h2>নতুন সদস্য হিসেবে নাম নিবন্ধন করুন</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label>সম্পূর্ণ নাম</label>
                    <input type="text" id="reg_name" placeholder="যেমন: MD REDOAN" required>
                </div>
                <div class="form-group">
                    <label>ইউজারনেম</label>
                    <input type="text" id="reg_username" placeholder="ইংরেজি ছোট অক্ষরে (যেমন: redoan12)" required>
                </div>
                <div class="form-group">
                    <label>হোয়াটসঅ্যাপ নম্বর</label>
                    <input type="text" id="reg_whatsapp" placeholder="যেমন: 01748723661" required>
                </div>
                <div class="form-group">
                    <label>এনআইডি (NID) নম্বর</label>
                    <input type="text" id="reg_nid" placeholder="আপনার এনআইডি নম্বর">
                </div>
                <div class="form-group">
                    <label>এক কপি ছবি আপলোড করুন</label>
                    <input type="file" id="reg_photo">
                </div>
                <div class="form-group">
                    <label>পাসওয়ার্ড তৈরি করুন</label>
                    <input type="password" id="reg_password" placeholder="পাসওয়ার্ড দিন" required>
                </div>
                <button type="submit" class="btn">নিবন্ধন সম্পন্ন করুন</button>
            </form>
        </div>
    </div>

    <script>
        // ট্যাব পরিবর্তন করার ফাংশন
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-buttons button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'login-tab') {
                document.getElementById('login-btn').classList.add('active');
            } else {
                document.getElementById('register-btn').classList.add('active');
            }
        }

        // রেজিস্ট্রেশন সাবমিট হ্যান্ডলার
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg_name').value;
            const username = document.getElementById('reg_username').value;
            const whatsapp_number = document.getElementById('reg_whatsapp').value;
            const password = document.getElementById('reg_password').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, whatsapp_number, password })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    alert('নিবন্ধন সফল হয়েছে! এখন লগইন করুন।');
                    switchTab('login-tab');
                } else {
                    alert(data.message || 'নিবন্ধন ব্যর্থ হয়েছে!');
                }
            } catch (error) {
                alert('সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না!');
            }
        });

        // লগইন সাবমিট হ্যান্ডলার
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login_username').value;
            const password = document.getElementById('login_password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    alert('লগইন সফল হয়েছে! ড্যাশবোর্ডে আপনাকে স্বাগতম।');
                    localStorage.setItem('username', username);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('name', data.name);

                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'member.html';
                    }
                } else {
                    alert(data.message || 'ইউজারনেম বা পাসওয়ার্ড ভুল!');
                }
            } catch (error) {
                alert('সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না!');
            }
        });
    </script>
</body>
</html>
