<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বন্ধুত্ব সঞ্চয় সমিতি</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>বন্ধুত্ব সঞ্চয় সমিতি</h2>
        
        <div class="tabs">
            <button id="loginTabBtn" class="active" onclick="switchTab('login')">লগইন</button>
            <button id="registerTabBtn" onclick="switchTab('register')">নিবন্ধন (Register)</button>
        </div>

        <div id="loginSection" class="form-section">
            <p class="section-title">সদস্য হিসেবে লগইন করুন</p>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="loginUsername">ইউজারনেম</label>
                    <input type="text" id="loginUsername" required placeholder="আপনার ইউজারনেম লিখুন">
                </div>
                <div class="input-group">
                    <label for="loginPassword">পাসওয়ার্ড</label>
                    <input type="password" id="loginPassword" required placeholder="আপনার পাসওয়ার্ড লিখুন">
                </div>
                <button type="submit" class="btn-submit">লগইন করুন</button>
            </form>
        </div>

        <div id="registerSection" class="form-section hidden">
            <p class="section-title">নতুন সদস্য হিসেবে নাম নিবন্ধন করুন</p>
            <form id="registerForm" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label for="regName">সম্পূর্ণ নাম</label>
                    <input type="text" id="regName" required placeholder="যেমন: MD REDOAN">
                </div>
                <div class="input-group">
                    <label for="regUsername">ইউজারনেম</label>
                    <input type="text" id="regUsername" required placeholder="ইংরেজি ছোট অক্ষরে (যেমন: redoan)">
                </div>
                <div class="input-group">
                    <label for="regWhatsapp">হোয়াটসঅ্যাপ নম্বর</label>
                    <input type="tel" id="regWhatsapp" required placeholder="যেমন: 01748723661">
                </div>
                <div class="input-group">
                    <label for="regNid">এনআইডি (NID) নম্বর</label>
                    <input type="text" id="regNid" required placeholder="আপনার এনআইডি নম্বর">
                </div>
                <div class="input-group">
                    <label for="regPhoto">এক কপি ছবি আপলোড করুন</label>
                    <input type="file" id="regPhoto" accept="image/*">
                </div>
                <div class="input-group">
                    <label for="regPassword">পাসওয়ার্ড তৈরি করুন</label>
                    <input type="password" id="regPassword" required placeholder="পাসওয়ার্ড দিন">
                </div>
                <button type="submit" class="btn-submit">নিবন্ধন সম্পন্ন করুন</button>
            </form>
        </div>
    </div>

    <script>
        // ট্যাব পরিবর্তন করার লজিক (Login <-> Register)
        function switchTab(tab) {
            const loginSection = document.getElementById('loginSection');
            const registerSection = document.getElementById('registerSection');
            const loginBtn = document.getElementById('loginTabBtn');
            const registerBtn = document.getElementById('registerTabBtn');

            if (tab === 'login') {
                loginSection.classList.remove('hidden');
                registerSection.classList.add('hidden');
                loginBtn.classList.add('active');
                registerBtn.classList.remove('active');
            } else {
                loginSection.classList.add('hidden');
                registerSection.classList.remove('hidden');
                loginBtn.classList.remove('active');
                registerBtn.classList.add('active');
            }
        }

        // রেজিস্ট্রেশন সাবমিট হ্যান্ডলার
        async function handleRegister(event) {
            event.preventDefault();
            
            const name = document.getElementById('regName').value;
            const username = document.getElementById('regUsername').value.toLowerCase().trim();
            const whatsapp_number = document.getElementById('regWhatsapp').value;
            const nid = document.getElementById('regNid').value;
            const password = document.getElementById('regPassword').value;
            const photoFile = document.getElementById('regPhoto').files[0];
            const photo_name = photoFile ? photoFile.name : 'no-photo.jpg';

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, password, whatsapp_number, nid, photo_name })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert('আপনার সকল তথ্য সফলভাবে যাচাই ও নিবন্ধন করা হয়েছে!');
                    document.getElementById('registerForm').reset();
                    switchTab('login'); // নিবন্ধন শেষে লগইন ট্যাবে নিয়ে যাবে
                } else {
                    alert(data.message || 'নিবন্ধন ব্যর্থ হয়েছে। আবার চেষ্টা করুন।');
                }
            } catch (error) {
                console.error(error);
                alert('সার্ভার সংযোগে সমস্যা হচ্ছে!');
            }
        }

        // লগইন সাবমিট হ্যান্ডলার
        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('loginUsername').value.toLowerCase().trim();
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    alert('লগইন সফল হয়েছে! ড্যাশবোর্ডে আপনাকে স্বাগতম।');
                    
                    // সেশন বা লোকাল স্টোরেজে তথ্য সেভ রাখা (ভবিষ্যতের জন্য)
                    localStorage.setItem('username', username);
                    localStorage.setItem('role', data.role);
                    localStorage.setItem('name', data.name);

                    // অ্যাডমিন নাকি সাধারণ মেম্বার তা যাচাই করে সঠিক পেজে পাঠানো
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'member.html';
                    }
                } else {
                    alert(data.message || 'ইউজারনেম বা পাসওয়ার্ড ভুল হয়েছে!');
                }
            } catch (error) {
                console.error(error);
                alert('সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না!');
            }
        }
    </script>
</body>
</html>
