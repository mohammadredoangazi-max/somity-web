<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য লগইন ও নিবন্ধন - বন্ধুত্ব সঞ্চয় সমিতি</title>
    <style>
        /* সম্পূর্ণ রেডিমেড প্রফেশনাল ডিজাইন - কোনো আলাদা CSS ফাইল লাগবে না */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74b9ff, #a29bfe);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #2d3436;
            margin-bottom: 5px;
            font-size: 24px;
        }
        h3 {
            text-align: center;
            color: #6c5ce7;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #2d3436;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: 0.3s;
        }
        .form-group input:focus {
            border-color: #6c5ce7;
            outline: none;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #5b4cc4;
        }
        .toggle-link {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #636e72;
        }
        .toggle-link a {
            color: #6c5ce7;
            text-decoration: none;
            font-weight: bold;
        }
        .toggle-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>বন্ধুত্ব সঞ্চয় সমিতি</h2>
        
        <div id="login-section">
            <h3>সদস্য হিসেবে লগইন করুন</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label for="login_username">ইউজারনেম:</label>
                    <input type="text" id="login_username" required placeholder="আপনার ইউজারনেম লিখুন">
                </div>
                <div class="form-group">
                    <label for="login_password">পাসওয়ার্ড:</label>
                    <input type="password" id="login_password" required placeholder="আপনার পাসওয়ার্ড লিখুন">
                </div>
                <button type="submit" class="btn">লগইন করুন</button>
            </form>
            <p class="toggle-link">নতুন সদস্য? <a href="#" onclick="toggleSections('register')">এখানে নাম নিবন্ধন করুন</a></p>
        </div>

        <div id="register-section" style="display: none;">
            <h3>নতুন সদস্য হিসেবে নাম নিবন্ধন করুন</h3>
            <form id="registerForm">
                <div class="form-group">
                    <label for="reg_name">সম্পূর্ণ নাম:</label>
                    <input type="text" id="reg_name" required placeholder="যেমন: MD REDOAN GAZI">
                </div>
                <div class="form-group">
                    <label for="reg_username">ইউজারনেম (ইংরেজি ছোট অক্ষরে):</label>
                    <input type="text" id="reg_username" required placeholder="যেমন: redoan12">
                </div>
                <div class="form-group">
                    <label for="reg_whatsapp">হোয়াটসঅ্যাপ নম্বর:</label>
                    <input type="text" id="reg_whatsapp" required placeholder="যেমন: 01748******">
                </div>
                <div class="form-group">
                    <label for="reg_password">পাসওয়ার্ড তৈরি করুন:</label>
                    <input type="password" id="reg_password" required placeholder="একটি স্ট্রং পাসওয়ার্ড দিন">
                </div>
                <button type="submit" class="btn">নিবন্ধন সম্পন্ন করুন</button>
            </form>
            <p class="toggle-link">ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="#" onclick="toggleSections('login')">এখানে লগইন করুন</a></p>
        </div>
    </div>

    <script>
        function toggleSections(target) {
            if (target === 'register') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('register-section').style.display = 'block';
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('register-section').style.display = 'none';
            }
        }

        // নিবন্ধন হ্যান্ডলার
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg_name').value;
            const username = document.getElementById('reg_username').value;
            const whatsapp_number = document.getElementById('reg_whatsapp').value;
            const password = document.getElementById('reg_password').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, whatsapp_number, password })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    alert('নিবন্ধন সফল হয়েছে! এখন লগইন করুন।');
                    toggleSections('login');
                } else {
                    alert(data.message || 'নিবন্ধন ব্যর্থ হয়েছে!');
                }
            } catch (error) {
                alert('সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না! ক্লাউডফ্লেয়ারে আপনার D1 ডেটাবেজ বাইন্ডিংটি চেক করুন।');
            }
        });

        // লগইন হ্যান্ডলার
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login_username').value;
            const password = document.getElementById('login_password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    alert('লগইন সফল হয়েছে! ড্যাশবোর্ডে আপনাকে স্বাগতম।');
                    localStorage.setItem('username', username);
                    localStorage.setItem('role', data.role);
                    window.location.href = data.role === 'admin' ? 'admin.html' : 'member.html';
                } else {
                    alert(data.message || 'ইউজারনেম বা পাসওয়ার্ড ভুল!');
                }
            } catch (error) {
                alert('সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না!');
            }
        });
    </script>
</body>
</html>
