<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য ড্যাশবোর্ড</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-family: Arial, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://images.unsplash.com/photo-1554415707-6e8cfc93fe23?q=80&w=2070') no-repeat center center/cover; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .login-box { width: 100%; max-width: 400px; padding: 30px; background: rgba(255, 255, 255, 0.95); border-radius: 15px; }
        /* এনিমেটেড নোটিশের স্টাইল */
        .marquee-notice { background: #fff3cd; color: #856404; font-weight: bold; padding: 12px; border-radius: 8px; margin-bottom: 20px; box-shadow: inset 0 0 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <!-- লগইন ফর্ম -->
    <div id="login-overlay">
        <div class="login-box card text-center">
            <h4 class="fw-bold mb-4">সদস্য লগইন</h4>
            <input type="number" id="member-id-input" class="form-control mb-3" placeholder="সদস্য আইডি দিন (যেমন: 1)">
            <button onclick="handleMemberLogin()" class="btn btn-primary w-100 fw-bold">লগইন করুন</button>
        </div>
    </div>

    <!-- ড্যাশবোর্ড কন্টেন্ট -->
    <div id="dashboard-content" style="display: none;">
        <nav class="navbar navbar-light bg-white px-4 py-3 mb-4 d-flex justify-content-between">
            <div>
                <h5 class="m-0 fw-bold" id="welcome-name">স্বাগতম, সদস্য</h5>
                <small class="text-muted">আইডি: #<span id="display-user-id">00</span></small>
            </div>
            <button class="btn btn-danger btn-sm fw-bold" onclick="location.reload()">লগআউট</button>
        </nav>

        <div class="container-fluid px-4">
            
            <!-- 📢 স্ক্রিনে ভেসে বেড়ানো লাইভ নোটিশ বোর্ড (Marquee) -->
            <div class="marquee-notice d-flex align-items-center">
                <span class="badge bg-danger me-2 p-2">🚨 নোটিশ:</span>
                <marquee id="live-notice-text" behavior="scroll" direction="left">লোড হচ্ছে...</marquee>
            </div>

            <!-- কার্ডসমূহ -->
            <div class="row g-3 mb-4">
                <div class="col-md-4"><div class="card p-3" style="border-left: 5px solid #0d6efd;"><small class="text-muted fw-bold">আমার মোট জমা</small><h3 class="fw-bold mt-1" id="my-total-deposit">০ টাকা</h3></div></div>
                <div class="col-md-4"><div class="card p-3" style="border-left: 5px solid #198754;"><small class="text-muted fw-bold">সমিতির মোট ফান্ড</small><h3 class="fw-bold mt-1" id="somity-total-fund">০ টাকা</h3></div></div>
                <div class="col-md-4"><div class="card p-3" style="border-left: 5px solid #dc3545;"><small class="text-muted fw-bold">আমার লোন বাকি</small><h3 class="fw-bold mt-1" id="my-loan-balance">০ টাকা</h3></div></div>
            </div>

            <!-- টেবিল -->
            <div class="card p-4">
                <h5 class="fw-bold mb-3">আমার মাসিক জমার বিবরণ (২০২৬)</h5>
                <table class="table text-center m-0"><thead class="table-light"><tr><th>মাস</th><th>টাকা</th><th>তারিখ</th><th>অবস্থা</th></tr></thead><tbody id="monthly-table-body"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        function handleMemberLogin() {
            const userId = document.getElementById('member-id-input').value;
            if(!userId) return alert("আইডি দিন!");
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('dashboard-content').style.display = 'block';
            loadMemberData(userId);
            loadLiveNotice();
        }

        // নোটিশ বোর্ড থেকে লাইভ নোটিশ এনে স্ক্রিনে ভাসিয়ে দেওয়া
        function loadLiveNotice() {
            fetch('/notice').then(res => res.json()).then(data => {
                if(data.success) document.getElementById('live-notice-text').innerText = data.content;
            });
        }

        function loadMemberData(userId) {
            fetch('/admin-get-all').then(res => res.json()).then(data => {
                if (data.success) {
                    const user = (data.results || []).find(u => u.id == userId);
                    if (!user) { alert("আইডি ভুল!"); location.reload(); return; }

                    document.getElementById('welcome-name').innerText = `স্বাগতম, ${user.name || user.username}`;
                    document.getElementById('display-user-id').innerText = userId;
                    document.getElementById('my-total-deposit').innerText = (user.totalDeposit || 0) + " টাকা";
                    document.getElementById('somity-total-fund').innerText = (data.totalFund || 0) + " টাকা";
                    document.getElementById('my-loan-balance').innerText = (user.loanStatus !== 'কোনো লোন নেই' ? user.loanStatus : "০ টাকা");

                    const isPaid = user.currentMonthStatus === 'পরিশোধিত';
                    document.getElementById('monthly-table-body').innerHTML = `
                        <tr>
                            <td><strong>মার্চ ২০২৬</strong></td>
                            <td class="${isPaid ? 'text-success fw-bold' : 'text-danger'}">${isPaid ? user.totalDeposit : '০'} টাকা</td>
                            <td>${isPaid ? 'আজ' : '--'}</td>
                            <td><span class="badge ${isPaid ? 'bg-success' : 'bg-danger'}">${user.currentMonthStatus || 'বাকি'}</span></td>
                        </tr>
                    `;
                }
            });
        }
    </script>
</body>
</html>
