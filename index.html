<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বন্ধুত্ব সঞ্চয় সমিতি</title>
    <style>
        /* রেডিমেড ইনলাইন সুন্দর ডিজাইন */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            text-align: center;
            color: #333;
            font-size: 24px;
            margin-bottom: 25px;
        }
        .tab-buttons {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        .tab-buttons button {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            font-size: 16px;
            cursor: pointer;
            color: #666;
            transition: 0.3s;
        }
        .tab-buttons button.active {
            color: #007bff;
            border-bottom: 3px solid #007bff;
            font-weight: bold;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>বন্ধুত্ব সঞ্চয় সমিতি</h1>

        <div class="tab-buttons">
            <button onclick="switchTab('login-tab')" id="login-btn" class="active">লগইন</button>
            <button onclick="switchTab('register-tab')" id="register-btn">নিবন্ধন (Register)</button>
        </div>

        <!-- লগইন ফর্ম -->
        <div id="login-tab" class="tab-content active">
            <form id="loginForm">
                <div class="form-group">
                    <label>ইউজারনেম</label>
                    <input type="text" id="login_username" placeholder="আপনার ইউজারনেম লিখুন" required>
                </div>
                <div class="form-group">
                    <label>পাসওয়ার্ড</label>
                    <input type="password" id="login_password" placeholder="আপনার পাসওয়ার্ড লিখুন" required>
                </div>
                <button type="submit" class="btn">লগইন করুন</button>
            </form>
        </div>

        <!-- নিবন্ধন ফর্ম -->
        <div id="register-tab" class="tab-content">
            <form id="registerForm">
                <div class="form-group">
                    <label>সম্পূর্ণ নাম</label>
                    <input type="text" id="reg_name" placeholder="যেমন: MD REDOAN" required>
                </div>
                <div class="form-group">
                    <label>ইউজারনেম</label>
                    <input type="text" id="reg_username" placeholder="ইংরেজি ছোট অক্ষরে লিখুন" required>
                </div>
                <div class="form-group">
                    <label>হোয়াটসঅ্যাপ নম্বর</label>
                    <input type="text" id="reg_whatsapp" placeholder="যেমন: 01748723661" required>
                </div>
                <div class="form-group">
                    <label>পাসওয়ার্ড তৈরি করুন</label>
                    <input type="password" id="reg_password" placeholder="পাসওয়ার্ড দিন" required>
                </div>
                <button type="submit" class="btn">নিবন্ধন সম্পন্ন করুন</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-buttons button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(tabId === 'login-tab') {
                document.getElementById('login-btn').classList.add('active');
            } else {
                document.getElementById('register-btn').classList.add('active');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg_name').value;
            const username = document.getElementById('reg_username').value;
            const whatsapp_number = document.getElementById('reg_whatsapp').value;
            const password = document.getElementById('reg_password').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, whatsapp_number, password })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    alert('নিবন্ধন সফল হয়েছে! এখন লগইন করুন।');
                    switchTab('login-tab');
                } else {
                    alert(data.message || 'নিবন্ধন ব্যর্থ হয়েছে!');
                }
            } catch (error) {
                alert('সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না! দয়া করে ক্লাউডফ্লেয়ারে Functions বাইন্ডিং চেক করুন।');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login_username').value;
            const password = document.getElementById('login_password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    alert('লগইন সফল হয়েছে!');
                    localStorage.setItem('username', username);
                    localStorage.setItem('role', data.role);
                    window.location.href = data.role === 'admin' ? 'admin.html' : 'member.html';
                } else {
                    alert(data.message || 'ইউজারনেম বা পাসওয়ার্ড ভুল!');
                }
            } catch (error) {
                alert('সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না!');
            }
        });
    </script>
</body>
</html>
