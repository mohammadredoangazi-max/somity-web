<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বন্ধুত্ব সঞ্চয় সমিতি</title>
    <style>
        /* নিখুঁত ফুল-স্ক্রিন ব্যাকগ্রাউন্ড থিম */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1f4068 0%, #162447 100%) !important;
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 100%;
            max-width: 420px;
            box-sizing: border-box;
            color: #ffffff;
        }
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        /* লোগো না থাকলেও এই ডিভটি একটি সুন্দর আইকন লোগো হিসেবে কাজ করবে */
        .default-logo {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            margin-bottom: 10px;
            border: 2px solid rgba(255, 255, 255, 0.4);
        }
        h2 { text-align: center; margin: 5px 0; font-size: 26px; font-weight: 600; letter-spacing: 0.5px; }
        h3 { text-align: center; margin-bottom: 25px; font-size: 16px; color: #cbd5e1; font-weight: 400; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; color: #e2e8f0; }
        .form-group input {
            width: 100%; padding: 12px; background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 10px;
            color: #ffffff; font-size: 14px; box-sizing: border-box; transition: 0.3s;
        }
        .form-group input::placeholder { color: #94a3b8; }
        .form-group input:focus { outline: none; background: rgba(255, 255, 255, 0.15); border-color: #38bdf8; }
        .btn {
            width: 100%; padding: 12px; background: #38bdf8; color: #ffffff;
            border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.3s; margin-top: 10px; box-shadow: 0 4px 12px rgba(56, 189, 248, 0.3);
        }
        .btn:hover { background: #0ea5e9; transform: translateY(-1px); }
        .toggle-link { text-align: center; margin-top: 20px; font-size: 14px; color: #94a3b8; }
        .toggle-link a { color: #38bdf8; font-weight: bold; text-decoration: none; }
        .toggle-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <div class="default-logo">👥</div>
            <h2>বন্ধুত্ব সঞ্চয় সমিতি</h2>
        </div>
        
        <div id="login-section">
            <h3>সদস্য হিসেবে লগইন করুন</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label>ইউজারনেম</label>
                    <input type="text" id="login_username" required placeholder="আপনার ইউজারনেম লিখুন">
                </div>
                <div class="form-group">
                    <label>পাসওয়ার্ড</label>
                    <input type="password" id="login_password" required placeholder="আপনার পাসওয়ার্ড লিখুন">
                </div>
                <button type="submit" class="btn">লগইন করুন</button>
            </form>
            <p class="toggle-link">নতুন সদস্য? <a href="#" onclick="toggleSections('register')">এখানে নাম নিবন্ধন করুন</a></p>
        </div>

        <div id="register-section" style="display: none;">
            <h3>নতুন সদস্য হিসেবে নাম নিবন্ধন করুন</h3>
            <form id="registerForm">
                <div class="form-group">
                    <label>সম্পূর্ণ নাম</label>
                    <input type="text" id="reg_name" required placeholder="যেমন: MD REDOAN">
                </div>
                <div class="form-group">
                    <label>ইউজারনেম (ইংরেজি ছোট অক্ষরে)</label>
                    <input type="text" id="reg_username" required placeholder="যেমন: redoan12">
                </div>
                <div class="form-group">
                    <label>হোয়াটসঅ্যাপ নম্বর</label>
                    <input type="text" id="reg_whatsapp" required placeholder="আপনার নম্বর দিন">
                </div>
                <div class="form-group">
                    <label>এনআইডি (NID) নম্বর</label>
                    <input type="text" id="reg_nid" required placeholder="আপনার এনআইডি নম্বর">
                </div>
                <div class="form-group">
                    <label>পাসওয়ার্ড তৈরি করুন</label>
                    <input type="password" id="reg_password" required placeholder="পাসওয়ার্ড দিন">
                </div>
                <button type="submit" class="btn">নিবন্ধন সম্পন্ন করুন</button>
            </form>
            <p class="toggle-link">ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="#" onclick="toggleSections('login')">এখানে লগইন করুন</a></p>
        </div>
    </div>

    <script>
        function toggleSections(target) {
            if (target === 'register') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('register-section').style.display = 'block';
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('register-section').style.display = 'none';
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg_name').value;
            const username = document.getElementById('reg_username').value.toLowerCase().trim();
            const whatsapp_number = document.getElementById('reg_whatsapp').value;
            const nid_number = document.getElementById('reg_nid').value;
            const password = document.getElementById('reg_password').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, whatsapp_number, nid_number, password })
                });
                const data = await response.json();
                alert(data.message);
                if (data.success) toggleSections('login');
            } catch (error) {
                alert('সার্ভার আপডেট হচ্ছে, কিছুক্ষণ পর আবার চেষ্টা করুন।');
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login_username').value.toLowerCase().trim();
            const password = document.getElementById('login_password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    alert('লগইন সফল হয়েছে!');
                    localStorage.setItem('username', username);
                    window.location.href = data.role === 'admin' ? 'admin.html' : 'member.html';
                } else {
                    alert(data.message);
                }
            } catch (error) {
                alert('সার্ভার রেসপন্স করছে না।');
            }
        });
    </script>
</body>
</html>
