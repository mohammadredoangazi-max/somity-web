<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>সদস্য লগইন ও নিবন্ধন - বন্ধুত্ব সঞ্চয় সমিতি</title>
    <style>
        /* তোর সেই আসল সুন্দর ব্যাকগ্রাউন্ড ও লোগোসহ কমপ্লিট ডিজাইন */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: radial-gradient(circle, #1e3c72 0%, #2a5298 100%);
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 100%;
            max-width: 430px;
            box-sizing: border-box;
            color: #ffffff;
        }

        /* লোগো এবং নাম সেকশন */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin: 10px 0 5px 0;
            font-size: 26px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            color: #ffffff;
        }

        h3 {
            text-align: center;
            margin-bottom: 25px;
            font-size: 18px;
            color: #e0e0e0;
            font-weight: 400;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            color: #f0f0f0;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 14px;
            color: #ffffff;
            transition: 0.3s;
        }

        .form-group input::placeholder {
            color: #dddddd;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.3);
            border-color: #ffffff;
            outline: none;
            box-shadow: 0 0 8px rgba(255,255,255,0.2);
        }

        .btn {
            width: 100%;
            padding: 13px;
            background: #ffffff;
            color: #1e3c72;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #e0e0e0;
        }

        .toggle-link a {
            color: #ffffff;
            text-decoration: none;
            font-weight: bold;
            border-bottom: 1px dashed #ffffff;
            padding-bottom: 2px;
        }

        .toggle-link a:hover {
            color: #f0f0f0;
            border-bottom-style: solid;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <h2>বন্ধুত্ব সঞ্চয় সমিতি</h2>
        </div>
        
        <div id="login-section">
            <h3>সদস্য হিসেবে লগইন করুন</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label for="login_username">ইউজারনেম</label>
                    <input type="text" id="login_username" required placeholder="আপনার ইউজারনেম লিখুন">
                </div>
                <div class="form-group">
                    <label for="login_password">পাসওয়ার্ড</label>
                    <input type="password" id="login_password" required placeholder="আপনার পাসওয়ার্ড লিখুন">
                </div>
                <button type="submit" class="btn">লগইন করুন</button>
            </form>
            <p class="toggle-link">নতুন সদস্য? <a href="#" onclick="toggleSections('register')">এখানে নাম নিবন্ধন করুন</a></p>
        </div>

        <div id="register-section" style="display: none;">
            <h3>নতুন সদস্য হিসেবে নাম নিবন্ধন করুন</h3>
            <form id="registerForm">
                <div class="form-group">
                    <label for="reg_name">সম্পূর্ণ নাম</label>
                    <input type="text" id="reg_name" required placeholder="যেমন: MD REDOAN GAZI">
                </div>
                <div class="form-group">
                    <label for="reg_username">ইউজারনেম (ইংরেজি ছোট অক্ষরে)</label>
                    <input type="text" id="reg_username" required placeholder="যেমন: redoan12">
                </div>
                <div class="form-group">
                    <label for="reg_whatsapp">হোয়াটসঅ্যাপ নম্বর</label>
                    <input type="text" id="reg_whatsapp" required placeholder="যেমন: 01748******">
                </div>
                <div class="form-group">
                    <label for="reg_password">পাসওয়ার্ড তৈরি করুন</label>
                    <input type="password" id="reg_password" required placeholder="একটি স্ট্রং পাসওয়ার্ড দিন">
                </div>
                <button type="submit" class="btn">নিবন্ধন সম্পন্ন করুন</button>
            </form>
            <p class="toggle-link">ইতিমধ্যে অ্যাকাউন্ট আছে? <a href="#" onclick="toggleSections('login')">এখানে লগইন করুন</a></p>
        </div>
    </div>

    <script>
        // ফর্ম টগল ফাংশন
        function toggleSections(target) {
            if (target === 'register') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('register-section').style.display = 'block';
            } else {
                document.getElementById('login-section').style.display = 'block';
                document.getElementById('register-section').style.display = 'none';
            }
        }

        // নিবন্ধন সাবমিট
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('reg_name').value;
            const username = document.getElementById('reg_username').value.toLowerCase().trim();
            const whatsapp_number = document.getElementById('reg_whatsapp').value;
            const password = document.getElementById('reg_password').value;

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, whatsapp_number, password })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    alert('নিবন্ধন সফল হয়েছে! এখন লগইন করুন।');
                    toggleSections('login');
                } else {
                    alert(data.message || 'নিবন্ধন ব্যর্থ হয়েছে!');
                }
            } catch (error) {
                alert('সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না! আপনার ডেটাবেজ কানেকশনটি চেক করুন।');
            }
        });

        // লগইন সাবমিট
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login_username').value.toLowerCase().trim();
            const password = document.getElementById('login_password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (response.ok && data.success) {
                    alert('লগইন সফল হয়েছে! ড্যাশবোর্ডে আপনাকে স্বাগতম।');
                    localStorage.setItem('username', username);
                    localStorage.setItem('role', data.role);
                    
                    if (data.role === 'admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'member.html';
                    }
                } else {
                    alert(data.message || 'ইউজারনেম বা পাসওয়ার্ড ভুল!');
                }
            } catch (error) {
                alert('সার্ভারের সাথে যোগাযোগ করা যাচ্ছে না!');
            }
        });
    </script>
</body>
</html>
